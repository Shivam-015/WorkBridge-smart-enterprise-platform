services:
  - type: web
    name: workbridge-chatbot
    runtime: python
    rootDir: ai/chatbot
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false  # you set this manually in Render dashboard
    autoDeploy: true
